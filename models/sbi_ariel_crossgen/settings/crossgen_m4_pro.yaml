seed: 42
task:
  name: crossgen_biosignature_regression_m4_pro
dataset:
  type: CrossGenRealFullNormalizedArielDataset
  path: data/generated-data/crossgen_biosignatures_20260311_prepared_sbi_ariel
  train_split: tau_train
  validation_split: tau_val
  holdout_split: poseidon_holdout
model:
  type: flow_matching
  posterior_model_type: flow_matching
  prior:
    type: StandardNormal
  posterior_kwargs:
    type: DenseResidualNet
    activation: gelu
    batch_norm: true
    context_with_glu: false
    dropout: 0.0
    hidden_dims_layers:
      - 128
      - 256
      - 512
      - 1024
      - 512
      - 256
      - 128
    multiplicative_factor_layers: 2
    sigma_min: 0.001
    theta_with_glu: true
    time_prior_exponent: -0.5
training:
  device: mps
  batch_size: 8192
  eval_batch_size: 8192
  epochs: 450
  patience: 400
  early_stopping: true
  checkpoint_every_batches: 10
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  optimizer:
    type: adam
    lr: 0.0005
  scheduler:
    type: cosine
    T_max: 150
  max_steps: null
evaluation:
  device: cpu
  posterior_samples: 32
  context_batch_size: 4
  progress_every_batches: 25
  run_after_training: false
  periodic_rmse_every_epochs: 100
  periodic_posterior_samples: 16
  periodic_context_batch_size: 4
  periodic_rmse_max_rows: 64
  periodic_rmse_seed: 42
logging:
  use_wandb: false
  project: hack4sages-crossgen-fmpe
  tags:
    - crossgen
    - fmpe
    - m4-pro
